<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>计数器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141210;--surface:#1e1c1a;--border:rgba(255,255,255,0.1);--text:#f0ece6;--muted:#7a766e;--hint:#4a4640;--green:#7ecf7e;--red:#e08080;--orange:#e0a060}
html,body{height:100%;height:100dvh;overflow:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center}
.bottom-nav{flex-shrink:0;height:calc(60px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--surface);border-top:1px solid var(--border);display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--hint);transition:color 0.15s;font-family:inherit;padding:0;-webkit-tap-highlight-color:transparent}
.tab .tab-icon{font-size:22px;line-height:1}.tab .tab-label{font-size:10px;letter-spacing:0.04em}
.tab.active{color:var(--text)}.tab.active .tab-label{font-weight:500}
.panel{display:none;flex-direction:column;align-items:center;width:100%;max-width:420px;margin:0 auto;padding:2.5rem 1.5rem 2rem}
.panel.active{display:flex}
.count-display{font-family:'DM Mono',monospace;font-size:clamp(90px,25vw,160px);font-weight:400;line-height:1;color:var(--text);transition:color 0.2s,transform 0.08s;margin-bottom:3rem;letter-spacing:-0.02em;min-width:4ch;text-align:center}
.count-display.negative{color:var(--red)}.count-display.bump{transform:scale(1.05)}
.controls{display:flex;align-items:center;gap:24px;margin-bottom:2rem}
.btn{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.12s,color 0.12s,transform 0.08s;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:scale(0.92);background:var(--bg);color:var(--text)}
.btn-main{width:96px;height:96px;font-size:38px;color:var(--text)}
.actions{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.ghost{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--hint);background:none;border:none;cursor:pointer;padding:10px 16px;border-radius:20px;transition:background 0.12s,color 0.12s;min-height:44px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.ghost:active{background:var(--surface);color:var(--muted)}
.status{font-family:'DM Mono',monospace;font-size:11px;color:var(--hint);display:flex;align-items:center;gap:6px;margin-bottom:1.5rem}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.history{width:100%;max-width:280px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
.history-row:last-child{border-bottom:none}.history-row .val{color:var(--text);font-weight:500}.history-row .time{color:var(--hint);font-size:11px}
.timer-display{font-family:'DM Mono',monospace;font-size:clamp(56px,16vw,100px);font-weight:400;letter-spacing:0.04em;color:var(--text);margin-bottom:2.4rem;transition:color 0.3s;text-align:center}
.timer-controls{display:flex;align-items:center;gap:14px;margin-bottom:1.6rem;flex-wrap:wrap;justify-content:center}
.btn-timer{height:52px;padding:0 26px;border-radius:26px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);cursor:pointer;transition:background 0.12s,transform 0.08s;white-space:nowrap;min-width:80px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-timer:active{transform:scale(0.96);background:var(--bg)}.btn-timer.primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn-timer.primary:active{opacity:0.85}
.laps{width:100%;max-width:280px;max-height:200px;overflow-y:auto}
.lap-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;font-family:'DM Mono',monospace;color:var(--muted)}
.lap-row:last-child{border-bottom:none}.lap-row .lap-t{color:var(--text)}
.cd-inputs{display:flex;align-items:center;gap:10px;margin-bottom:1.4rem;transition:opacity 0.2s}
.cd-input-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.cd-input-wrap label{font-family:'DM Mono',monospace;font-size:11px;color:var(--hint);letter-spacing:0.1em}
.cd-input{width:72px;padding:10px 0;text-align:center;font-family:'DM Mono',monospace;font-size:26px;font-weight:400;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border-color 0.15s}
.cd-input:focus{border-color:var(--muted)}.cd-sep{font-family:'DM Mono',monospace;font-size:26px;color:var(--hint)}
.presets{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.8rem;transition:opacity 0.2s}
.preset{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);padding:8px 16px;border-radius:18px;border:1px solid var(--border);background:none;cursor:pointer;min-height:44px;display:flex;align-items:center;transition:background 0.12s,color 0.12s;-webkit-tap-highlight-color:transparent}
.preset:active{background:var(--surface);color:var(--text)}
.progress-ring{margin-bottom:1.8rem}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.35}}.flashing{animation:flash 0.6s infinite}
.reward-card{width:100%;border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:14px;background:var(--surface)}
.reward-draw-btn{width:100%;padding:14px 0;border-radius:12px;border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;font-weight:500;transition:opacity 0.15s,transform 0.1s;min-height:52px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.reward-draw-btn:active:not(:disabled){transform:scale(0.97);opacity:0.82}.reward-draw-btn:disabled{opacity:0.4;cursor:default}
.sop-selbar::-webkit-scrollbar{display:none}
.sop-selbar{scrollbar-width:none;-ms-overflow-style:none}
/* Office minimal theme */
html.theme-office{--bg:#fafafa;--surface:#ffffff;--border:rgba(0,0,0,0.05);--text:#555;--muted:#aaa;--hint:#ccc;--green:#7cb97c;--red:#d08080;--orange:#c8a060}
html.theme-office .sop-selbar::-webkit-scrollbar{display:block;height:2px}
html.theme-office .sop-selbar::-webkit-scrollbar-track{background:transparent}
html.theme-office .sop-selbar::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px}
html.theme-office .sop-selbar{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,0.15) transparent}
html.theme-office body{border:1px solid var(--border)}
html.theme-office .bottom-nav{display:none}
html.theme-office #theme-btn{top:8px;right:8px}
/* Theme toggle button */
#theme-btn{position:fixed;top:10px;right:10px;z-index:999;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:14px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;opacity:0.7;transition:opacity 0.15s}
#theme-btn:hover{opacity:1}
</style>
</head>
<body>
<div class="page-content">
<section class="panel" id="panel-counter">
<div class="count-display" id="display">0</div>
<div class="controls">
<button class="btn" id="btn-minus">−</button>
<button class="btn btn-main" id="btn-add">+</button>
<button class="btn" id="btn-undo" style="font-size:18px;">撤</button>
</div>
<div class="actions">
<button class="ghost" id="btn-reset">重置</button>
<button class="ghost" id="btn-clear-history">清除历史</button>
</div>
<div class="status"><span class="dot"></span><span id="status-text">已就绪</span></div>
<div class="history" id="history-box"></div>
</section>
<section class="panel" id="panel-stopwatch">
<div class="timer-display" id="sw-display">00:00.0</div>
<div class="timer-controls">
<button class="btn-timer primary" id="sw-start">开始</button>
<button class="btn-timer" id="sw-lap" disabled>记圈</button>
<button class="btn-timer" id="sw-reset-btn">重置</button>
</div>
<div class="laps" id="sw-laps"></div>
</section>
<section class="panel" id="panel-countdown">
<div class="cd-inputs" id="cd-inputs">
<div class="cd-input-wrap"><label>时</label><input class="cd-input" id="cd-h" type="number" min="0" max="99" value="0"></div>
<span class="cd-sep">:</span>
<div class="cd-input-wrap"><label>分</label><input class="cd-input" id="cd-m" type="number" min="0" max="59" value="5"></div>
<span class="cd-sep">:</span>
<div class="cd-input-wrap"><label>秒</label><input class="cd-input" id="cd-s" type="number" min="0" max="59" value="0"></div>
</div>
<div class="presets" id="cd-presets">
<button class="preset" onclick="setPreset(1,0,0)">1小时</button>
<button class="preset" onclick="setPreset(0,25,0)">25分钟</button>
<button class="preset" onclick="setPreset(0,10,0)">10分钟</button>
<button class="preset" onclick="setPreset(0,5,0)">5分钟</button>
<button class="preset" onclick="setPreset(0,1,0)">1分钟</button>
<button class="preset" onclick="setPreset(0,0,30)">30秒</button>
</div>
<svg class="progress-ring" width="160" height="160" viewBox="0 0 160 160">
<circle cx="80" cy="80" r="70" fill="none" stroke="var(--border)" stroke-width="6"/>
<circle id="cd-ring" cx="80" cy="80" r="70" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="0" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 0.4s,stroke 0.3s"/>
<text id="cd-ring-text" x="80" y="88" text-anchor="middle" font-family="DM Mono,monospace" font-size="28" fill="var(--text)">05:00</text>
</svg>
<div class="timer-controls">
<button class="btn-timer primary" id="cd-start">开始</button>
<button class="btn-timer" id="cd-reset-btn">重置</button>
</div>
<div id="cd-done-msg" style="font-family:'DM Mono',monospace;font-size:13px;color:var(--red);min-height:22px;margin-top:2px;"></div>
</section>
<section class="panel" id="panel-reward"></section>
<section class="panel" id="panel-task"></section>
<section class="panel active" id="panel-sop"></section>
<section class="panel" id="panel-log"></section>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<button id="theme-btn" onclick="toggleTheme()"></button>

<script>
/* THEME */
var THEME_KEY='my_theme_v1';
var currentTheme='dark';
function isOfficeHours(){var d=new Date(),day=d.getDay(),h=d.getHours();return day>=1&&day<=4&&h>=7&&h<15;}
function applyTheme(name){
currentTheme=name;
document.documentElement.className=name==='office'?'theme-office':'';
var btn=document.getElementById('theme-btn');
if(btn)btn.textContent=name==='office'?'🌙 暗色':'☀️ 极简';
try{localStorage.setItem(THEME_KEY,name);}catch(e){}
if(name==='office'){
// force 上班日 SOP
document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
var sp=document.getElementById('panel-sop');if(sp)sp.classList.add('active');
currentTabId='sop';
// select 上班日 once sopList is loaded
if(typeof sopList!=='undefined'&&sopList.length){
var wi=sopList.findIndex(function(s){return s.name==='上班日';});
if(wi>=0){sopActiveListIdx=wi;}
if(typeof renderSOP==='function')renderSOP();
}
}
}
function toggleTheme(){applyTheme(currentTheme==='office'?'dark':'office');}
function loadTheme(){
var saved=null;try{saved=localStorage.getItem(THEME_KEY);}catch(e){}
applyTheme(saved||(isOfficeHours()?'office':'dark'));
}
loadTheme();

var _store={};
function _cSet(k,v){_store[k]=String(v);if(window.storage)window.storage.set(k,String(v)).catch(function(){});}
function _cGet(k){return _store[k]!==undefined?_store[k]:null;}
function _cDel(k){delete _store[k];if(window.storage)window.storage.delete(k).catch(function(){});}

async function _initStorage(){
var keys=['my_counter_v1','my_counter_history_v1','my_rewards_v1','my_tasks_v1','my_task_pools_v1','my_sop_list_v2','my_sop_active_idx','my_sop_inputs_v1','my_sop_log_v1','my_sop_session_v1','my_tab_order_v1'];
for(var i=0;i<keys.length;i++){try{var r=await window.storage.get(keys[i]);if(r&&r.value!==undefined)_store[keys[i]]=r.value;}catch(e){}}
}

var TAB_ORDER_KEY='my_tab_order_v1';
var ALL_TABS=[
{id:'sop',      icon:'🌅', label:'起床'},
{id:'counter',  icon:'🔢', label:'计数'},
{id:'stopwatch',icon:'⏱',  label:'计时'},
{id:'countdown',icon:'⏳', label:'倒计时'},
{id:'reward',   icon:'🎁', label:'奖励'},
{id:'task',     icon:'✅', label:'任务'},
{id:'log',      icon:'📖', label:'本周'}
];
var tabOrder=null;
var currentTabId='sop';
var navDragSrc=null;

function loadTabOrder(){
try{
var s=_cGet(TAB_ORDER_KEY);
if(s){var o=JSON.parse(s);if(Array.isArray(o)){var validIds=ALL_TABS.map(function(t){return t.id;});var filtered=o.filter(function(id){return validIds.indexOf(id)>=0;});validIds.forEach(function(id){if(filtered.indexOf(id)<0)filtered.push(id);});tabOrder=filtered;return;}}
}catch(e){}
tabOrder=ALL_TABS.map(function(t){return t.id;});
}
function saveTabOrder(){_cSet(TAB_ORDER_KEY,JSON.stringify(tabOrder));}

function switchTab(name){
currentTabId=name;
document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
var panel=document.getElementById('panel-'+name);
if(panel)panel.classList.add('active');
renderNav();
if(name==='log')renderLogPanel();
}

function renderNav(){
var nav=document.getElementById('bottom-nav');if(!nav)return;nav.innerHTML='';
tabOrder.forEach(function(tabId,i){
var tabDef=ALL_TABS.find(function(t){return t.id===tabId;});if(!tabDef)return;
var btn=document.createElement('button');
btn.className='tab'+(currentTabId===tabId?' active':'');
btn.innerHTML='<span class="tab-icon">'+tabDef.icon+'</span><span class="tab-label">'+tabDef.label+'</span>';
btn.dataset.tabid=tabId;btn.dataset.idx=i;
btn.style.cssText='touch-action:none;user-select:none;';
btn.onclick=function(){if(navDragSrc!==null)return;switchTab(tabId);};
btn.addEventListener('mousedown',function(e){
if(e.button!==0)return;
var startX=e.clientX,moved=false;
var onMove=function(e2){
if(!moved&&Math.abs(e2.clientX-startX)>6){moved=true;navDragSrc=i;btn.style.opacity='0.4';}
if(!moved)return;
var el=document.elementFromPoint(e2.clientX,e2.clientY);
var target=el&&el.closest&&el.closest('[data-tabid]');
if(target&&target!==btn){var toIdx=parseInt(target.dataset.idx);if(!isNaN(toIdx)&&toIdx!==navDragSrc){var m=tabOrder.splice(navDragSrc,1)[0];tabOrder.splice(toIdx,0,m);navDragSrc=toIdx;saveTabOrder();renderNav();}}
};
var onUp=function(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);btn.style.opacity='1';if(moved)setTimeout(function(){navDragSrc=null;},50);else navDragSrc=null;};
document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
});
nav.appendChild(btn);
});
}

/* COUNTER */
var STORAGE_KEY='my_counter_v1',HISTORY_KEY='my_counter_history_v1',count=0,stack=[],counterLog=[];
var display=document.getElementById('display'),statusText=document.getElementById('status-text'),historyBox=document.getElementById('history-box');
function loadCounter(){try{var s=_cGet(STORAGE_KEY);if(s!==null)count=parseInt(s,10)||0;var h=_cGet(HISTORY_KEY);if(h)counterLog=JSON.parse(h);}catch(e){}renderCount();renderHistory();if(count!==0)setStatus('已恢复上次数据');}
function saveCounter(){try{_cSet(STORAGE_KEY,String(count));_cSet(HISTORY_KEY,JSON.stringify(counterLog));setStatus('已自动保存');}catch(e){setStatus('保存失败');}}
function renderCount(){display.textContent=count;display.classList.toggle('negative',count<0);display.classList.add('bump');setTimeout(function(){display.classList.remove('bump');},80);}
var statusTimer;
function setStatus(msg){statusText.textContent=msg;clearTimeout(statusTimer);statusTimer=setTimeout(function(){statusText.textContent='上次保存 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1800);}
function addHistory(action){counterLog.unshift({action:action,value:count,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});if(counterLog.length>8)counterLog.pop();renderHistory();}
function renderHistory(){if(!counterLog.length){historyBox.innerHTML='';return;}historyBox.innerHTML=counterLog.map(function(h){return '<div class="history-row"><span>'+h.action+'</span><span class="val">'+h.value+'</span><span class="time">'+h.time+'</span></div>';}).join('');}
function update(n,a){stack.push(count);count=n;renderCount();addHistory(a);saveCounter();}
document.getElementById('btn-add').addEventListener('click',function(){update(count+1,'+1');});
document.getElementById('btn-minus').addEventListener('click',function(){update(count-1,'−1');});
document.getElementById('btn-undo').addEventListener('click',function(){if(!stack.length)return;count=stack.pop();renderCount();addHistory('撤销');saveCounter();});
document.getElementById('btn-reset').addEventListener('click',function(){stack.length=0;count=0;renderCount();addHistory('重置');saveCounter();});
document.getElementById('btn-clear-history').addEventListener('click',function(){counterLog=[];renderHistory();try{_cDel(HISTORY_KEY);}catch(e){}});
var holdTimer,holdInterval;
function startHold(){holdTimer=setTimeout(function(){holdInterval=setInterval(function(){update(count+1,'+1');},80);},500);}
function stopHold(){clearTimeout(holdTimer);clearInterval(holdInterval);}
var addBtn=document.getElementById('btn-add');
addBtn.addEventListener('mousedown',startHold);['mouseup','mouseleave'].forEach(function(e){addBtn.addEventListener(e,stopHold);});
addBtn.addEventListener('touchstart',function(e){e.preventDefault();startHold();},{passive:false});
['touchend','touchcancel'].forEach(function(e){addBtn.addEventListener(e,stopHold);});
document.addEventListener('keydown',function(e){if(!document.getElementById('panel-counter').classList.contains('active'))return;if(e.key==='ArrowUp'||e.key==='+')update(count+1,'+1');else if(e.key==='ArrowDown'||e.key==='-')update(count-1,'−1');else if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();document.getElementById('btn-undo').click();}});

/* STOPWATCH */
var swRunning=false,swElapsed=0,swStart=0,swRaf=null,laps=[],lastLapAt=0;
var swDisplay=document.getElementById('sw-display'),swStartBtn=document.getElementById('sw-start'),swLapBtn=document.getElementById('sw-lap'),swLapList=document.getElementById('sw-laps');
function fmtSW(ms){ms=Math.max(0,Math.floor(ms));var min=Math.floor(ms/60000),sec=Math.floor((ms%60000)/1000),tenth=Math.floor((ms%1000)/100);return String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0')+'.'+tenth;}
function swTick(){swElapsed=Date.now()-swStart;swDisplay.textContent=fmtSW(swElapsed);swRaf=requestAnimationFrame(swTick);}
swStartBtn.addEventListener('click',function(){if(!swRunning){swRunning=true;swStart=Date.now()-swElapsed;swStartBtn.textContent='暂停';swLapBtn.disabled=false;swRaf=requestAnimationFrame(swTick);}else{swRunning=false;cancelAnimationFrame(swRaf);swStartBtn.textContent='继续';swLapBtn.disabled=true;}});
swLapBtn.addEventListener('click',function(){var lt=swElapsed-lastLapAt;lastLapAt=swElapsed;laps.unshift({n:laps.length+1,lap:lt,total:swElapsed});renderLaps();});
document.getElementById('sw-reset-btn').addEventListener('click',function(){swRunning=false;cancelAnimationFrame(swRaf);swElapsed=0;swStart=0;lastLapAt=0;laps=[];swDisplay.textContent='00:00.0';swStartBtn.textContent='开始';swLapBtn.disabled=true;renderLaps();});
function renderLaps(){swLapList.innerHTML=laps.map(function(l){return '<div class="lap-row"><span>第'+l.n+'圈</span><span class="lap-t">'+fmtSW(l.lap)+'</span><span style="color:var(--hint);font-size:10px">'+fmtSW(l.total)+'</span></div>';}).join('');}

/* COUNTDOWN */
var cdTotal=0,cdRemaining=0,cdRunning=false,cdStart2=0,cdRaf2=null,cdDone=false;
var cdStartBtn=document.getElementById('cd-start'),cdResetBtn=document.getElementById('cd-reset-btn');
var cdRing=document.getElementById('cd-ring'),cdRingText=document.getElementById('cd-ring-text'),cdDoneMsg=document.getElementById('cd-done-msg');
var RING_FULL=2*Math.PI*70;
function getInputSecs(){var h=parseInt(document.getElementById('cd-h').value)||0,m=parseInt(document.getElementById('cd-m').value)||0,s=parseInt(document.getElementById('cd-s').value)||0;return h*3600+m*60+s;}
function fmtCD(secs){secs=Math.max(0,Math.ceil(secs));var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;if(h>0)return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function updateRing(r,t){var f=t>0?Math.min(1,r/t):1;cdRing.setAttribute('stroke-dashoffset',(RING_FULL*(1-f)).toFixed(2));cdRingText.textContent=fmtCD(r);cdRing.setAttribute('stroke',r<=0?'var(--red)':r<=Math.max(5,t*0.1)?'var(--orange)':'var(--green)');}

var sopActive=false,sopCurrentIdx=0,sopPaused=false,sopRemaining=0,sopStepTotal=0;
var sopInterval=null,sopOvertime=false,sopOvertimeStart=0,sopOvertimeElapsed=0,sopStart=0;

function saveSopSession(){
if(!sopActive){_cDel(SOP_SESSION_KEY);return;}
_cSet(SOP_SESSION_KEY,JSON.stringify({listIdx:sopActiveListIdx,stepIdx:sopCurrentIdx,stepStart:sopStart,overtime:sopOvertime,overtimeStart:sopOvertimeStart,paused:sopPaused}));
}

<script>
function restoreSopSession(){
try{
var s=_cGet(SOP_SESSION_KEY);if(!s)return;
var sess=JSON.parse(s);if(!sess||sess.listIdx===undefined)return;
sopActiveListIdx=sess.listIdx;
var sop=currentSOP();if(!sop)return;
var idx=sess.stepIdx;if(idx<0||idx>=sop.steps.length)return;
var now=Date.now();
if(sess.overtime){
sopActive=true;sopCurrentIdx=idx;sopStepTotal=sop.steps[idx].duration;sopRemaining=0;sopOvertime=true;sopOvertimeStart=sess.overtimeStart;sopOvertimeElapsed=(now-sess.overtimeStart)/1000;sopPaused=false;sopInterval=setInterval(sopTick,200);
}else{
var elapsed=(now-sess.stepStart)/1000;var curIdx=idx;var stepDur=sop.steps[idx].duration;
while(elapsed>=stepDur&&curIdx<sop.steps.length-1){elapsed-=stepDur;curIdx++;stepDur=sop.steps[curIdx].duration;}
sopActive=true;sopCurrentIdx=curIdx;sopStepTotal=stepDur;
if(elapsed>=stepDur){sopRemaining=0;sopOvertime=true;sopOvertimeStart=now-(elapsed-stepDur)*1000;sopOvertimeElapsed=elapsed-stepDur;}
else{sopRemaining=stepDur-elapsed;sopOvertime=false;sopStart=now-elapsed*1000;}
sopPaused=false;sopInterval=setInterval(sopTick,200);
}
}catch(e){_cDel(SOP_SESSION_KEY);}
}

function calcDurations(steps){function t2m(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}for(var i=0;i<steps.length;i++){steps[i].duration=i<steps.length-1?Math.max(60,(t2m(steps[i+1].time)-t2m(steps[i].time))*60):60;}}
function currentSOP(){return sopList[sopActiveListIdx];}
function fmtSecs(s){s=Math.ceil(s);var m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

function loadSOP(){
try{
var s=_cGet(SOP_LIST_KEY);sopList=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_SOPS));
var ai=_cGet(SOP_ACTIVE_KEY);sopActiveListIdx=ai?parseInt(ai):0;
var xbi=-1;sopList.forEach(function(s,i){if(s.name==='下班回家')xbi=i;});
if(xbi===-1){sopList.push(JSON.parse(JSON.stringify(DEFAULT_SOPS[4])));}
var mi=-1;sopList.forEach(function(s,i){if(s.name==='周一早上')mi=i;});
if(mi===-1){sopList.push(JSON.parse(JSON.stringify(DEFAULT_SOPS[2])));}
else{sopList[mi]=JSON.parse(JSON.stringify(DEFAULT_SOPS[2]));}
var wi=-1;sopList.forEach(function(s,i){if(s.name==='上班日')wi=i;});
if(wi===-1){sopList.push(JSON.parse(JSON.stringify(DEFAULT_SOPS[3])));}
else{sopList[wi]=JSON.parse(JSON.stringify(DEFAULT_SOPS[3]));}
_cSet(SOP_LIST_KEY,JSON.stringify(sopList));
}catch(e){sopList=JSON.parse(JSON.stringify(DEFAULT_SOPS));sopActiveListIdx=0;}
sopList.forEach(function(sop){calcDurations(sop.steps);});renderSOP();
}
function saveSOP(){try{_cSet(SOP_LIST_KEY,JSON.stringify(sopList));_cSet(SOP_ACTIVE_KEY,String(sopActiveListIdx));}catch(e){}}
function startSOP(fromIdx){sopActive=true;sopPaused=false;beginStep(fromIdx||0);}
function beginStep(idx){
var sop=currentSOP();
if(sop){var step=sop.steps[idx];var inputKey=sopActiveListIdx+'_'+step.id;var txt=sopInputs[inputKey];if(txt&&txt.trim())addLogEntry(sop.name,step.title,txt.trim());}
sopCurrentIdx=idx;sopStepTotal=currentSOP().steps[idx].duration;sopRemaining=sopStepTotal;sopOvertime=false;sopOvertimeElapsed=0;sopPaused=false;sopStart=Date.now();clearInterval(sopInterval);sopInterval=setInterval(sopTick,200);saveSopSession();renderSOP();
}
function sopTick(){
if(sopPaused)return;
if(sopOvertime){sopOvertimeElapsed=(Date.now()-sopOvertimeStart)/1000;updateSOPTimer();}
else{var total=(Date.now()-sopStart)/1000;sopRemaining=Math.max(0,sopStepTotal-total);updateSOPTimer();if(sopRemaining<=0){sopOvertime=true;sopOvertimeStart=Date.now();clearInterval(sopInterval);sopInterval=setInterval(sopTick,200);renderSOP();}}
}
function pauseSOP(){
if(!sopPaused){sopPaused=true;clearInterval(sopInterval);sopInterval=null;renderSOP();}
else{sopPaused=false;if(sopOvertime){sopOvertimeStart=Date.now()-sopOvertimeElapsed*1000;}else{sopStart=Date.now()-(sopStepTotal-sopRemaining)*1000;}sopInterval=setInterval(sopTick,200);saveSopSession();renderSOP();}
}
function skipSOP(){clearInterval(sopInterval);sopInterval=null;var steps=currentSOP().steps;if(sopCurrentIdx<steps.length-1){beginStep(sopCurrentIdx+1);}else{sopActive=false;renderSOP();}}
function stopSOP(){clearInterval(sopInterval);sopInterval=null;sopActive=false;sopPaused=false;sopCurrentIdx=0;saveSopSession();renderSOP();}
function updateSOPTimer(){
var el=document.getElementById('sop-timer'),ring=document.getElementById('sop-ring');if(!el)return;
var CIRC=2*Math.PI*54;
if(sopOvertime){el.textContent='00:00';if(ring){ring.setAttribute('stroke-dashoffset',CIRC.toFixed(2));ring.setAttribute('stroke','var(--red)');}var ot=document.getElementById('sop-overtime');if(ot)ot.textContent='+'+fmtSecs(sopOvertimeElapsed);}
else{el.textContent=fmtSecs(sopRemaining);if(ring){ring.setAttribute('stroke-dashoffset',(CIRC*(1-sopRemaining/sopStepTotal)).toFixed(2));ring.setAttribute('stroke','var(--green)');}}
}
